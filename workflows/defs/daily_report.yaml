name: daily_report
description: Daily AI news report
steps:
  - tool: search_web
    params:
      query: AI news today
      num_results: 5
  - tool: execute_code
    params:
      code: |
        from datetime import datetime
        print(f'# AI Daily - {datetime.now().strftime("%Y-%m-%d")}')
        print('Auto-generated report')
  - tool: file_ops
    params:
      action: write
      path: daily_report.md
      content: '{{last_result}}'
